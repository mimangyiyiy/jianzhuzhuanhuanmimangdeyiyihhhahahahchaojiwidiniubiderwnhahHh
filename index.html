<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC建筑转换器 v3.6</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0d0d2b,#1a1a3e,#0f0f2e);min-height:100vh;font-family:"Segoe UI","Microsoft YaHei",sans-serif;padding:20px}
        .container{max-width:960px;margin:0 auto}
        h1{font-size:24px;color:#fff;margin-bottom:4px}
        h1 span{background:linear-gradient(135deg,#7c4dff,#448aff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .sub{color:#889;font-size:13px;margin-bottom:10px}
        .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;margin-bottom:10px}
        .row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px}
        label{font-size:12px;color:#999}
        input[type=file]{font-size:12px;color:#ccc;background:transparent;border:none;cursor:pointer}
        input[type=text],input[type=number]{padding:3px 6px;border:1px solid rgba(255,255,255,.1);border-radius:4px;background:rgba(0,0,0,.3);color:#ccc;font-size:12px;width:70px}
        .btn{padding:6px 16px;border:none;border-radius:5px;font-size:12px;cursor:pointer;color:#fff;display:inline-block;text-decoration:none;transition:.15s}
        .btn-primary{background:linear-gradient(135deg,#7c4dff,#5e35e0)}
        .btn-primary:hover:not(:disabled){opacity:.85;transform:scale(1.02)}
        .btn-secondary{background:linear-gradient(135deg,#448aff,#2962ff)}
        .btn-secondary:hover:not(:disabled){opacity:.85;transform:scale(1.02)}
        .btn-success{background:linear-gradient(135deg,#00c853,#00a844)}
        .btn-success:hover:not(:disabled){opacity:.85;transform:scale(1.02)}
        .btn-danger{background:linear-gradient(135deg,#ff1744,#d50000)}
        .btn-danger:hover:not(:disabled){opacity:.85;transform:scale(1.02)}
        .btn:disabled{opacity:.35;cursor:not-allowed}
        .btn-sm{padding:3px 10px;font-size:11px}
        .btn-preview{background:linear-gradient(135deg,#00b894,#00a381)}
        .btn-preview:hover:not(:disabled){opacity:.85;transform:scale(1.02)}
        #st{font-size:13px;padding:10px 16px;border-radius:6px;margin-bottom:8px;background:rgba(255,255,255,.03);transition:all .3s;border-left:3px solid transparent;min-height:38px}
        #st.status-ok{border-left-color:#00c853;color:#69db7c}
        #st.status-err{border-left-color:#ff1744;color:#ff6b6b}
        #st.status-info{border-left-color:#448aff;color:#74c0fc}
        #st.status-file{border-left-color:#ffd43b;color:#ffd43b;background:rgba(255,212,59,.08)}
        #ld{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(13,13,43,.92);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
        #ld.s{display:flex}
        #sp{width:40px;height:40px;border:3px solid rgba(124,77,255,.2);border-top-color:#7c4dff;border-radius:50%;animation:s .8s linear infinite}
        @keyframes s{to{transform:rotate(360deg)}}
        #lt{color:#889;font-size:13px}
        .tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.06);margin-top:8px}
        .tab{padding:5px 14px;cursor:pointer;font-size:12px;color:#666;border-bottom:2px solid transparent;transition:.2s}
        .tab:hover{color:#aaa}
        .tab.a{color:#ccc;border-bottom-color:#7c4dff}
        .tab-c{display:none;margin-top:6px}
        .tab-c.s{display:block}
        .box{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px;font-family:Consolas,monospace;font-size:11px;color:#8b8baa;height:300px;overflow:auto;white-space:pre-wrap;word-break:break-all}
        .box-lg{height:420px}
        .badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;background:rgba(124,77,255,.2);color:#b197fc;margin-left:6px}
        .checkbox-label{font-size:12px;color:#999;display:flex;align-items:center;gap:4px;cursor:pointer}
        .checkbox-label input[type=checkbox]{accent-color:#7c4dff;width:14px;height:14px;cursor:pointer}
        .drop-zone{border:2px dashed rgba(255,255,255,.1);border-radius:8px;padding:20px;text-align:center;color:#555;transition:.3s;cursor:pointer;position:relative}
        .drop-zone:hover{border-color:rgba(124,77,255,.4);background:rgba(124,77,255,.05)}
        .drop-zone.drag-over{border-color:#7c4dff;background:rgba(124,77,255,.12);transform:scale(1.01)}
        .drop-zone.has-file{border-color:#ffd43b;background:rgba(255,212,59,.06)}
        .drop-zone .icon{font-size:32px;display:block;margin-bottom:4px}
        .drop-zone .file-name-display{font-size:14px;color:#ffd43b;font-weight:500;margin-top:4px}
        .drop-zone .file-size-display{font-size:11px;color:#666}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 28px;border-radius:10px;font-size:14px;font-weight:500;z-index:10000;opacity:0;transition:all .4s cubic-bezier(0.68,-0.55,0.265,1.55);pointer-events:none;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1)}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        .toast.success{border-color:#00c853;color:#69db7c}
        .toast.error{border-color:#ff1744;color:#ff6b6b}
        .toast.info{border-color:#448aff;color:#74c0fc}
        .copy-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#aaa;padding:2px 10px;border-radius:4px;font-size:11px;cursor:pointer;transition:.2s}
        .copy-btn:hover{background:rgba(255,255,255,.15);color:#fff}
        .flex-right{margin-left:auto;display:flex;gap:6px;align-items:center}
        .preview-info-overlay{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.7);padding:6px 14px;border-radius:6px;font-size:12px;color:#aaa;pointer-events:none;z-index:10}
        #preview3d{width:100%;height:500px;border-radius:8px;background:#0d0d2b;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
        #preview3d .big-icon{font-size:48px;opacity:.3}
        #preview3d .hint{color:#555;font-size:14px;text-align:center;line-height:1.6}
        #preview3d .hint small{color:#444;font-size:12px}
        #progress-wrap{width:100%;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;margin-top:6px;overflow:hidden;position:relative;display:none}
        #progress-wrap.active{display:block}
        #progress-bar{height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,#7c4dff,#448aff,#00c853);background-size:200% 100%;animation:progress-shimmer 1.5s ease-in-out infinite;transition:width .15s ease-out}
        @keyframes progress-shimmer{0%{background-position:0% 0%}100%{background-position:200% 0%}}
        #progress-text{font-size:11px;color:#aaa;margin-top:2px;display:block}
        #st-top{display:flex;justify-content:space-between;align-items:center}
        @media(max-width:600px){.row{gap:4px}input[type=text],input[type=number]{width:50px}.btn{padding:4px 10px;font-size:11px}#preview3d{height:300px}.toast{font-size:12px;padding:10px 20px;bottom:20px;max-width:90%}}
    </style>
</head>
<body>

    <div id="ld"><div id="sp"></div><div id="lt">处理中...</div></div>
    <div id="toast" class="toast"></div>

    <div class="container">
        <h1>MC <span>建筑转换器</span> v3.6</h1>
        <div class="sub">作者: 小逸罒不迷茫 | B站: space.bilibili.com/3546638146603426 <span class="badge">Web版</span></div>
        <div id="st">
            <div id="st-top">
                <span id="st-text">⏳ 加载映射表中...</span>
                <span id="mapStatus" style="font-size:11px;color:#666;">映射表: 加载中 0%</span>
            </div>
            <div id="progress-wrap" class="active">
                <div id="progress-bar" style="width:0%"></div>
            </div>
            <span id="progress-text">加载映射表 (0%)</span>
        </div>

        <div class="card">
            <div class="drop-zone" id="dropZone"><span class="icon" id="dropIcon">[+]</span><span id="dropText">点击选择文件 或 拖拽 .schematic / .litematic 到此处</span><input type="file" id="fi" accept=".schematic,.litematic" style="display:none;"><div id="fileInfo" style="margin-top:6px;display:none;"><div class="file-name-display" id="fileNameDisplay"></div><div class="file-size-display" id="fileSizeDisplay"></div></div></div>

            <div class="row"><label>计分板:</label><input type="text" id="sb" value="dr" style="width:60px"><label>速度:</label><input type="number" id="spd" value="1" style="width:45px" min="1" max="10"><label>h标签:</label><input type="text" id="ht" value="h" style="width:35px"><label>b标签:</label><input type="text" id="bt" value="b" style="width:35px"><label>上限:</label><input type="number" id="mc" value="10000" style="width:60px" min="100" max="99999"></div>
            <div class="row" style="margin-top:6px;"><label class="checkbox-label"><input type="checkbox" id="disableSensitive" checked>启用敏感词过滤</label><span style="font-size:11px;color:#555;margin-left:4px;" id="sensitiveCount">规则: 6 条</span><span style="font-size:11px;color:#666;margin-left:8px;">(检测计分板分数)</span></div>
            <div class="row" style="margin-top:8px;"><button class="btn btn-preview" id="pb" onclick="preview()" disabled>生成3D预览</button><button class="btn btn-primary" id="cb" onclick="convert()" disabled>转换</button><button class="btn btn-success" id="dlBtn" onclick="downloadCommands()" disabled style="display:none;">下载指令</button><button class="btn btn-danger btn-sm" onclick="clearAll()">清空</button><span style="font-size:11px;color:#555;margin-left:auto;" id="infoText"></span></div>
        </div>

        <div class="tabs"><div class="tab a" onclick="switchTab('lg')">日志</div><div class="tab" onclick="switchTab('cm')">指令</div><div class="tab" onclick="switchTab('pr')">3D预览</div></div>

        <div class="tab-c s" id="lgC"><div class="box" id="lg" style="height:180px;font-size:12px;">加载映射表中...</div></div>
        <div class="tab-c" id="cmC"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span style="font-size:11px;color:#666;">共 <span id="cmdCount">0</span> 条指令</span><div><button class="copy-btn" onclick="copyCommands()">复制</button></div></div><div class="box box-lg" id="cm">等待转换...</div></div>
        <div class="tab-c" id="prC"><div style="display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;align-items:center;"><button class="btn btn-preview btn-sm" id="previewDownloadBtn" onclick="downloadPreviewHTML()" style="display:none;">下载预览HTML</button><span style="font-size:11px;color:#666;" id="previewInfo"></span><span style="font-size:11px;color:#555;" id="previewStatus"></span></div><div id="preview3d"><div class="big-icon">[建筑]</div><div class="hint">点击「生成3D预览」生成预览HTML<br><small>下载后用浏览器打开查看3D模型</small></div><div class="preview-info-overlay" id="prInfo" style="display:none;"></div></div></div>
    </div>

    <script>
        // ============================================================
        // 先定义基础函数
        // ============================================================
        var _SF_RULES = [
            /3224909018|2265778903|1632249606|1477550673|110101195306153019|976410387|878880263|804305473|762469277|635793980|560802433|534369147|517213791|422427876|375415740|281798694|259256141|183339779|163721419|70363734|40609891|479988|19132/i,
            /3.{0,3}?7.{0,3}?5.{0,3}?4.{0,3}?1.{0,3}?5/i,
            /8[^1-8a-z]*?9*?6[^1-46-9a-z]*?4|6[^1-9a-z]*?4[^0-9a-z]*?8[^1-9a-z]*?9/i,
            /(?<![a-z0-9#])8\s*?9\s*?6\s*?4(?![0-9a-z_])/i,
            /(?<![a-z0-9])19890?60?4(?![a-z0-9])|(?<![0-9])98753210?(?![0-9])/i,
            /^(?!.*?([0-9])\1{3,}?).*?(?<![0-9a-z#])(1[12345]|2[123]|3[1234567]|4[123456]|5[012345]|6[12345])[0-9]{4}(19[0-9]{2}|20[012][0-9])(0[1-9]|1[012])(0[1-9]|[123][0-9])[0-9]{3}[0-9x](?![0-9a-z])/i
        ];

        var _SF = {
            contains: function(t) {
                if (!t) return false;
                var s = String(t);
                if (!/^\d+$/.test(s)) return false;
                for (var i = 0; i < _SF_RULES.length; i++) {
                    if (_SF_RULES[i].test(s)) return true;
                }
                return false;
            },
            count: function() {
                return _SF_RULES.length;
            }
        };

        var toastTimer = null;

        function showToast(msg, type) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + (type || 'info') + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function() {
                el.classList.remove('show');
            }, 3000);
        }

        var lg = document.getElementById('lg');
        var fi = document.getElementById('fi');
        var dropZone = document.getElementById('dropZone');
        var currentFileData = null;
        var currentFileName = '';
        var currentCommands = null;
        var currentPreviewResult = null;
        var currentPreviewHTML = null;

        var sbEl = document.getElementById('sb');
        var spdEl = document.getElementById('spd');
        var htEl = document.getElementById('ht');
        var btEl = document.getElementById('bt');
        var mcEl = document.getElementById('mc');
        var pbBtn = document.getElementById('pb');
        var cbBtn = document.getElementById('cb');
        var dlBtn = document.getElementById('dlBtn');
        var cmBox = document.getElementById('cm');
        var infoText = document.getElementById('infoText');
        var cmdCountEl = document.getElementById('cmdCount');
        var disableSensitiveEl = document.getElementById('disableSensitive');
        var sensitiveCountEl = document.getElementById('sensitiveCount');
        var previewDownloadBtn = document.getElementById('previewDownloadBtn');
        var previewInfo = document.getElementById('previewInfo');
        var previewStatus = document.getElementById('previewStatus');
        var prInfo = document.getElementById('prInfo');
        var preview3d = document.getElementById('preview3d');
        var mapStatus = document.getElementById('mapStatus');
        var stText = document.getElementById('st-text');
        var progressWrap = document.getElementById('progress-wrap');
        var progressBar = document.getElementById('progress-bar');
        var progressText = document.getElementById('progress-text');

        sensitiveCountEl.textContent = '规则: ' + _SF.count() + ' 条';

        function log(msg) {
            var line = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            lg.textContent += line + '\n';
            lg.scrollTop = lg.scrollHeight;
        }

        function setStatus(msg, cls) {
            var el = document.getElementById('st');
            el.className = cls || '';
            stText.textContent = msg;
        }

        function showLoading(msg) {
            document.getElementById('lt').textContent = msg || '处理中...';
            document.getElementById('ld').className = 's';
        }

        function hideLoading() {
            document.getElementById('ld').className = '';
        }

        function switchTab(name) {
            document.querySelectorAll('.tab,.tab-c').forEach(function(el) {
                el.classList.remove('a', 's');
            });
            document.getElementById(name + 'C').classList.add('s');
            document.querySelector('.tab[onclick*="' + name + '"]').classList.add('a');
        }

        function showProgress(show) {
            if (show) {
                progressWrap.classList.add('active');
            } else {
                progressWrap.classList.remove('active');
                progressBar.style.width = '0%';
                progressText.textContent = '';
            }
        }

        function setProgress(pct, label) {
            var p = Math.min(Math.max(pct, 0), 100);
            progressBar.style.width = p + '%';
            var txt = label || '加载映射表';
            progressText.textContent = txt + ' (' + Math.round(p) + '%)';
            mapStatus.textContent = '映射表: ' + Math.round(p) + '%';
        }

        function clearAll() {
            currentFileData = null;
            currentFileName = '';
            currentCommands = null;
            currentPreviewResult = null;
            currentPreviewHTML = null;
            fi.value = '';
            updateFileUI(null);
            pbBtn.disabled = true;
            cbBtn.disabled = true;
            dlBtn.style.display = 'none';
            previewDownloadBtn.style.display = 'none';
            previewInfo.textContent = '';
            previewStatus.textContent = '';
            prInfo.style.display = 'none';
            preview3d.innerHTML =
                '<div class="big-icon">[建筑]</div><div class="hint">点击「生成3D预览」生成预览HTML<br><small>下载后用浏览器打开查看3D模型</small></div><div class="preview-info-overlay" id="prInfo" style="display:none;"></div>';
            cmBox.textContent = '等待转换...';
            cmdCountEl.textContent = '0';
            setStatus('已清空');
            log('已清空所有数据');
            infoText.textContent = '';
            showToast('已清空所有数据', 'info');
        }

        function updateFileUI(file) {
            var fn = document.getElementById('fileNameDisplay');
            var fs = document.getElementById('fileSizeDisplay');
            var fi2 = document.getElementById('fileInfo');
            if (file) {
                dropZone.classList.add('has-file');
                fi2.style.display = 'block';
                fn.textContent = file.name;
                var sz = file.size;
                if (sz < 1024) fs.textContent = sz + ' B';
                else if (sz < 1024 * 1024) fs.textContent = (sz / 1024).toFixed(1) + ' KB';
                else fs.textContent = (sz / (1024 * 1024)).toFixed(1) + ' MB';
                document.getElementById('dropText').textContent = '文件已选择，点击可更换';
                document.getElementById('dropIcon').textContent = '[文件]';
                showToast('已加载: ' + file.name, 'success');
            } else {
                dropZone.classList.remove('has-file');
                fi2.style.display = 'none';
                document.getElementById('dropText').textContent = '点击选择文件 或 拖拽 .schematic / .litematic 到此处';
                document.getElementById('dropIcon').textContent = '[+]';
            }
        }

        // ============================================================
        // handleFile - 文件选择核心函数
        // ============================================================
        function handleFile(file) {
            if (!file) return;
            var ext = file.name.split('.').pop().toLowerCase();
            if (ext !== 'schematic' && ext !== 'litematic') {
                setStatus('不支持的文件格式: ' + ext, 'status-err');
                log('不支持的文件格式: ' + ext);
                showToast('不支持的文件格式: ' + ext, 'error');
                return;
            }
            currentFileName = file.name;
            updateFileUI(file);
            pbBtn.disabled = false;
            cbBtn.disabled = false;
            dlBtn.style.display = 'none';
            previewDownloadBtn.style.display = 'none';
            setStatus('已加载: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)', 'status-file');
            log('加载文件: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)');

            var reader = new FileReader();
            reader.onload = function(e) {
                currentFileData = new Uint8Array(e.target.result);
                log('文件读取完成，大小: ' + currentFileData.length + ' 字节');
                setStatus('就绪，可预览或转换: ' + file.name, 'status-file');
                showToast('文件已就绪', 'success');
            };
            reader.onerror = function() {
                setStatus('读取文件失败', 'status-err');
                log('读取文件失败');
                showToast('读取文件失败', 'error');
            };
            reader.readAsArrayBuffer(file);
        }

        // ============================================================
        // 事件绑定
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            fi.addEventListener('change', function(e) {
                if (fi.files.length > 0) {
                    handleFile(fi.files[0]);
                }
            });

            dropZone.addEventListener('click', function() {
                fi.click();
            });

            dropZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });

            dropZone.addEventListener('dragleave', function() {
                dropZone.classList.remove('drag-over');
            });

            dropZone.addEventListener('drop', function(e) {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                if (e.dataTransfer.files.length > 0) {
                    fi.files = e.dataTransfer.files;
                    handleFile(e.dataTransfer.files[0]);
                }
            });
        });

        function getParams() {
            return {
                sb: sbEl.value || 'dr',
                sp: parseInt(spdEl.value) || 1,
                ht: htEl.value || 'h',
                bt: btEl.value || 'b',
                mc: parseInt(mcEl.value) || 10000,
                disableSensitive: disableSensitiveEl.checked
            };
        }

        function copyCommands() {
            var t = cmBox.textContent;
            if (!t || t === '等待转换...') return;
            navigator.clipboard.writeText(t).then(function() {
                showToast('已复制到剪贴板', 'success');
            }).catch(function() {
                var ta = document.createElement('textarea');
                ta.value = t;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('已复制到剪贴板', 'success');
            });
        }

        // ============================================================
        // 加载 block_map.js 并显示进度
        // ============================================================
        var blockMap = {};
        var mapLoaded = false;

        function loadBlockMap() {
            showProgress(true);
            setProgress(0, '加载映射表');

            // 创建 script 标签加载 block_map.js
            var script = document.createElement('script');
            script.src = 'block_map.js';

            // 加载完成
            script.onload = function() {
                try {
                    if (typeof BLOCK_MAP !== 'undefined' && BLOCK_MAP !== null) {
                        blockMap = BLOCK_MAP;
                        mapLoaded = true;
                        var count = Object.keys(blockMap).length;
                        setProgress(100, '加载完成!');
                        mapStatus.textContent = '映射表: 已加载 ' + count + ' 条';
                        mapStatus.style.color = '#69db7c';
                        stText.textContent = '✅ 就绪 — 拖拽文件到下方或点击选择';
                        log('✅ 映射表加载完成: ' + count + ' 条');
                        showToast('映射表加载完成: ' + count + ' 条', 'success');
                        setTimeout(function() {
                            showProgress(false);
                        }, 800);
                    } else {
                        throw new Error('BLOCK_MAP 未定义');
                    }
                } catch (e) {
                    setProgress(0, '加载失败');

        loadBlockMap();

        function getBedrockId(javaId) {
            if (!mapLoaded) {
                return javaId.split(':').pop() || javaId;
            }

            if (blockMap[javaId] !== undefined) {
                return blockMap[javaId];
            }

            var bracket = javaId.indexOf('[');
            if (bracket > -1) {
                var base = javaId.substring(0, bracket);
                if (blockMap[base] !== undefined) {
                    return blockMap[base];
                }
                var props = javaId.substring(bracket + 1, javaId.length - 1);
                var propPairs = props.split(',');
                var sortedProps = propPairs.slice().sort();
                var key = base + '[' + sortedProps.join(',') + ']';
                if (blockMap[key] !== undefined) {
                    return blockMap[key];
                }
            }

            return javaId.split(':').pop() || javaId;
        }
