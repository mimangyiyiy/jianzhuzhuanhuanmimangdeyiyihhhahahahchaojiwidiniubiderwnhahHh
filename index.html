<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC 建筑转换器 v3.6</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #0d0d2b;
    min-height: 100vh;
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    padding: 20px;
    color: #ccc;
}
.container {
    max-width: 960px;
    margin: 0 auto;
}

/* 水印 */
.wm {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 999;
    opacity: .06;
}

/* 头部 */
.header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-bottom: 12px;
}
.header h1 {
    font-size: 24px;
    color: #fff;
}
.header h1 span {
    background: linear-gradient(135deg, #7c4dff, #448aff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}
.header .sub {
    font-size: 13px;
    color: #889;
}
.header .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    background: rgba(124, 77, 255, .2);
    color: #b197fc;
    margin-left: 6px;
}

/* 状态栏 */
#status {
    background: rgba(255, 255, 255, .03);
    border-left: 3px solid #7c4dff;
    border-radius: 6px;
    padding: 10px 16px;
    margin-bottom: 10px;
    font-size: 13px;
}

/* 卡片 */
.card {
    background: rgba(255, 255, 255, .04);
    border: 1px solid rgba(255, 255, 255, .08);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
}

/* 拖拽区 */
.drop-zone {
    border: 2px dashed rgba(255, 255, 255, .1);
    border-radius: 8px;
    padding: 24px 20px;
    text-align: center;
    cursor: pointer;
    transition: .3s;
}
.drop-zone:hover {
    border-color: rgba(124, 77, 255, .4);
    background: rgba(124, 77, 255, .05);
}
.drop-zone.drag-over {
    border-color: #7c4dff;
    background: rgba(124, 77, 255, .12);
}
.drop-zone.has-file {
    border-color: #ffd43b;
    background: rgba(255, 212, 59, .06);
}
.drop-zone .file-name {
    color: #ffd43b;
    font-weight: 500;
    margin-top: 4px;
    font-size: 14px;
}
.drop-zone .file-size {
    font-size: 11px;
    color: #666;
}
.drop-zone input[type=file] {
    display: none;
}
.drop-zone .icon {
    display: inline-block;
    margin-bottom: 4px;
    color: #666;
}

/* 表单行 */
.row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 8px;
}
.row label {
    font-size: 12px;
    color: #999;
}
.row input[type=text],
.row input[type=number] {
    padding: 4px 8px;
    border: 1px solid rgba(255, 255, 255, .1);
    border-radius: 4px;
    background: rgba(0, 0, 0, .3);
    color: #ccc;
    font-size: 12px;
    width: 60px;
}
.row input[type=file] {
    font-size: 12px;
    color: #ccc;
    background: transparent;
    border: none;
    cursor: pointer;
}

/* 按钮 */
.btn {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    color: #fff;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: .15s;
    font-weight: 500;
}
.btn:disabled {
    opacity: .35;
    cursor: not-allowed;
}
.btn-primary {
    background: linear-gradient(135deg, #7c4dff, #5e35e0);
}
.btn-primary:hover:not(:disabled) {
    opacity: .85;
    transform: scale(1.02);
}
.btn-success {
    background: linear-gradient(135deg, #00c853, #00a844);
}
.btn-success:hover:not(:disabled) {
    opacity: .85;
    transform: scale(1.02);
}
.btn-preview {
    background: linear-gradient(135deg, #00b894, #00a381);
}
.btn-preview:hover:not(:disabled) {
    opacity: .85;
    transform: scale(1.02);
}
.btn-danger {
    background: linear-gradient(135deg, #ff1744, #d50000);
}
.btn-danger:hover:not(:disabled) {
    opacity: .85;
    transform: scale(1.02);
}
.btn-warning {
    background: linear-gradient(135deg, #ffd43b, #f9a825);
    color: #1a1a3e;
}
.btn-warning:hover:not(:disabled) {
    opacity: .85;
    transform: scale(1.02);
}
.btn-secondary {
    background: rgba(255, 255, 255, .08);
    border: 1px solid rgba(255, 255, 255, .1);
}
.btn-secondary:hover:not(:disabled) {
    background: rgba(255, 255, 255, .15);
}
.btn-sm {
    padding: 4px 12px;
    font-size: 12px;
}
.btn-link {
    background: transparent;
    color: #888;
    padding: 4px 8px;
    font-size: 12px;
}
.btn-link:hover {
    color: #fff;
}

/* 标签页 */
.tabs {
    display: flex;
    border-bottom: 1px solid rgba(255, 255, 255, .06);
    margin-top: 6px;
}
.tab {
    padding: 6px 16px;
    cursor: pointer;
    font-size: 12px;
    color: #666;
    border-bottom: 2px solid transparent;
    transition: .2s;
    display: flex;
    align-items: center;
    gap: 4px;
}
.tab:hover {
    color: #aaa;
}
.tab.active {
    color: #ccc;
    border-bottom-color: #7c4dff;
}
.tab-content {
    display: none;
    margin-top: 6px;
}
.tab-content.active {
    display: block;
}

/* 日志/指令框 */
.box {
    background: rgba(0, 0, 0, .4);
    border: 1px solid rgba(255, 255, 255, .06);
    border-radius: 8px;
    padding: 10px;
    font-family: Consolas, monospace;
    font-size: 12px;
    color: #8b8baa;
    height: 260px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-all;
}
.box-lg {
    height: 380px;
}
.box-sm {
    height: 150px;
}
.box-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
}
.box-header span {
    font-size: 11px;
    color: #666;
}
.copy-btn {
    background: rgba(255, 255, 255, .08);
    border: 1px solid rgba(255, 255, 255, .1);
    color: #aaa;
    padding: 2px 12px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
}
.copy-btn:hover {
    background: rgba(255, 255, 255, .15);
    color: #fff;
}

/* 预览 */
iframe {
    width: 100%;
    height: 500px;
    border: none;
    border-radius: 8px;
    margin-top: 8px;
    background: #0d0d2b;
}

/* 敏感词 */
.sens-area {
    width: 100%;
    height: 160px;
    font-family: Consolas, monospace;
    font-size: 12px;
    margin-top: 8px;
    background: rgba(0, 0, 0, .3);
    border: 1px solid rgba(255, 255, 255, .06);
    border-radius: 6px;
    padding: 8px;
    color: #ccc;
}
.sens-area:focus {
    outline: none;
    border-color: #7c4dff;
}
.sens-area[readonly] {
    background: rgba(255, 255, 255, .04);
    color: #666;
}

/* 加载遮罩 */
#loadingOverlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(13, 13, 43, .92);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
}
#loadingOverlay.active {
    display: flex;
}
#loadingOverlay .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(124, 77, 255, .2);
    border-top-color: #7c4dff;
    border-radius: 50%;
    animation: spin .8s linear infinite;
}
@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}
#loadingOverlay .loading-text {
    color: #889;
    font-size: 13px;
}

/* Toast */
#toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    z-index: 10000;
    opacity: 0;
    transition: all .4s;
    pointer-events: none;
    background: rgba(0, 0, 0, .85);
    border: 1px solid rgba(255, 255, 255, .1);
}
#toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
#toast.success {
    border-color: #00c853;
    color: #69db7c;
}
#toast.error {
    border-color: #ff1744;
    color: #ff6b6b;
}
#toast.info {
    border-color: #448aff;
    color: #74c0fc;
}

/* ===== 启动弹窗 ===== */
#startupModal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, .85);
    backdrop-filter: blur(8px);
    z-index: 99999;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
#startupModal.active {
    display: flex;
}
.modal-box {
    background: linear-gradient(145deg, #1a1a4e, #0d0d2b);
    border: 1px solid rgba(255, 255, 255, .1);
    border-radius: 16px;
    padding: 32px 40px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, .8);
    position: relative;
}
.modal-box .warning-icon {
    color: #ffd43b;
    margin-bottom: 16px;
}
.modal-box h2 {
    font-size: 20px;
    color: #ffd43b;
    margin-bottom: 10px;
}
.modal-box p {
    font-size: 14px;
    color: #999;
    line-height: 1.6;
    margin-bottom: 20px;
}
.modal-box .btn-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.modal-box .btn-group .btn {
    justify-content: center;
    padding: 12px 24px;
    font-size: 14px;
    width: 100%;
}
.modal-box .version-tag {
    display: inline-block;
    padding: 2px 12px;
    border-radius: 10px;
    font-size: 11px;
    background: rgba(255, 212, 59, .15);
    color: #ffd43b;
    margin-bottom: 12px;
}

/* 响应式 */
@media(max-width:600px) {
    .row {
        gap: 4px;
    }
    .row input[type=text],
    .row input[type=number] {
        width: 40px;
    }
    .btn {
        padding: 6px 12px;
        font-size: 11px;
    }
    .header h1 {
        font-size: 18px;
    }
    .box {
        height: 180px;
    }
    .box-lg {
        height: 280px;
    }
    .modal-box {
        padding: 24px 20px;
    }
}
</style>
</head>
<body>

<!-- ===== 启动弹窗 ===== -->
<div id="startupModal" class="active">
    <div class="modal-box">
        <div class="warning-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ffd43b" stroke-width="2">
                <path d="M12 9v4"/>
                <path d="M12 17h.01"/>
                <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
            </svg>
        </div>
        <div class="version-tag">⚠ 开发预览版</div>
        <h2>网站尚未完善</h2>
        <p>当前版本生成的指令可能存在问题，<br>请勿在正式服务器使用。</p>
        <div class="btn-group">
            <button class="btn btn-warning" onclick="goDownload()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                立即前往下载已完成版本 <span style="font-size:11px;opacity:.7">(推荐)</span>
            </button>
            <button class="btn btn-secondary" onclick="closeModal()">
                我不管，我非要留在这个没有做完的网站
            </button>
        </div>
    </div>
</div>

<!-- 水印 -->
<svg class="wm" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <defs>
        <pattern id="wp" x="0" y="0" width="300" height="300" patternUnits="userSpaceOnUse">
            <text transform="rotate(-30)" x="0" y="150" font-size="26" font-family="Microsoft YaHei,SimHei,sans-serif" fill="#888">小逸罒不迷茫</text>
        </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#wp)"/>
</svg>

<!-- 加载遮罩 -->
<div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">处理中...</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<div class="container">

    <!-- 头部 -->
    <div class="header">
        <h1>MC <span>建筑转换器</span> v3.6</h1>
        <div class="sub">作者: 小逸罒不迷茫 <span class="badge">网页版</span></div>
    </div>

    <!-- 状态 -->
    <div id="status">⏳ 就绪，请上传文件</div>

    <!-- 主卡片 -->
    <div class="card">

        <!-- 拖拽区 -->
        <div class="drop-zone" id="dropZone">
            <span class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </span>
            <div><span id="dropText">点击选择 或 拖拽 .schematic / .litematic</span></div>
            <div id="fileInfo" style="display:none;margin-top:4px;">
                <div class="file-name" id="fileNameDisplay"></div>
                <div class="file-size" id="fileSizeDisplay"></div>
            </div>
            <input type="file" id="fileInput" accept=".schematic,.litematic">
        </div>

        <!-- 参数 -->
        <div class="row">
            <label>计分板:</label><input type="text" id="sbName" value="dr" style="width:50px">
            <label>速度:</label><input type="text" id="speed" value="1" style="width:40px">
            <label>高度盔甲架:</label><input type="text" id="hTag" value="h" style="width:40px">
            <label>扫描盔甲架:</label><input type="text" id="bTag" value="b" style="width:40px">
            <label>指令上限:</label><input type="text" id="maxChars" value="10000" style="width:60px">
        </div>

        <!-- 按钮 -->
        <div class="row" style="margin-top:8px">
            <button class="btn btn-primary" onclick="convert()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                转换
            </button>
            <button class="btn btn-preview" id="previewBtn" onclick="preview()" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                预览
            </button>
            <button class="btn btn-danger btn-sm" onclick="clearAll()" style="margin-left:auto">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    <line x1="10" y1="11" x2="10" y2="17"/>
                    <line x1="14" y1="11" x2="14" y2="17"/>
                </svg>
                清空
            </button>
            <span style="font-size:11px;color:#555;margin-left:8px" id="infoText"></span>
        </div>
        <div id="dlArea" style="display:none;margin-top:8px">
            <a class="btn btn-success btn-sm" id="dlLink" style="text-decoration:none">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                下载指令文件
            </a>
        </div>
    </div>

    <!-- 标签页 -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('log')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            日志
        </div>
        <div class="tab" onclick="switchTab('cmd')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="4 17 10 11 4 5"/>
                <line x1="12" y1="19" x2="20" y2="19"/>
            </svg>
            指令
        </div>
        <div class="tab" onclick="switchTab('preview')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            预览
        </div>
        <div class="tab" onclick="switchTab('sens')">敏感词</div>
        <div class="tab" style="margin-left:auto" onclick="switchVer('cli')">文本模式</div>
        <div class="tab" onclick="switchVer('gui')">GUI</div>
        <div class="tab">
            <a href="https://space.bilibili.com/3546638146603426" target="_blank" style="color:#fb7299;text-decoration:none;display:flex;align-items:center;gap:4px">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.813 4.653h.854l1.338 1.606v10.66l-1.338 1.607H16.11l-2.183 2.147h-3.848L7.896 18.526H5.333L3.995 16.919V6.259l1.338-1.606h.854l1.872-1.87 1.872 1.87h4.122l1.872-1.87 1.872 1.87zm-1.338 2.14H7.525l-1.06 1.07v9.237l1.06 1.07h8.95l1.06-1.07V7.864l-1.06-1.07zm-6.316 2.674v6.955h-2.14V9.467h2.14zm4.816 0v6.955h-2.14V9.467h2.14z"/>
                </svg>
                B站
            </a>
        </div>
    </div>

    <!-- 日志 -->
    <div class="tab-content active" id="logContent">
        <div class="box box-sm" id="log"></div>
    </div>

    <!-- 指令 -->
    <div class="tab-content" id="cmdContent">
        <div class="box-header">
            <span>共 <span id="cmdCount">0</span> 条指令</span>
            <button class="copy-btn" onclick="copyCommands()">复制</button>
        </div>
        <div class="box box-lg" id="cmdLog">等待转换...</div>
    </div>

    <!-- 预览 -->
    <div class="tab-content" id="previewContent">
        <iframe id="previewFrame"></iframe>
    </div>

    <!-- 敏感词 -->
    <div class="tab-content" id="sensContent">
        <div class="card">
            <div style="font-size:12px;color:#999;margin-bottom:6px">你的词表: 每行一词, !开头=白名单豁免, #开头=注释</div>
            <div class="row" style="margin-top:4px">
                <button class="btn btn-primary btn-sm" onclick="saveSensitive()">保存</button>
                <button class="btn btn-preview btn-sm" onclick="loadSensitive()">刷新</button>
                <button class="btn btn-secondary btn-sm" onclick="viewOfficial()">查看内置规则</button>
                <span id="rmMsg" style="margin-left:12px;font-size:13px;color:#69db7c"></span>
            </div>
            <textarea class="sens-area" id="sensArea"></textarea>
            <textarea class="sens-area" id="offArea" readonly style="display:none"></textarea>
        </div>
    </div>

</div>

<script>
// ============================================================
// 弹窗控制
// ============================================================
function goDownload() {
    window.location.href = 'https://mmdyy-xywbmm.zh.kg/download';
}

function closeModal() {
    document.getElementById('startupModal').classList.remove('active');
}

// ============================================================
// 核心功能
// ============================================================
function log(m) {
    var e = document.getElementById('log');
    e.textContent += m + '\n';
    e.scrollTop = e.scrollHeight;
}

function switchTab(n) {
    document.querySelectorAll('.tab, .tab-content').forEach(function(el) {
        el.classList.remove('active');
    });
    document.getElementById(n + 'Content').classList.add('active');
    document.querySelector('.tab[onclick*="' + n + '"]').classList.add('active');
}

function showLoad() {
    document.getElementById('loadingOverlay').classList.add('active');
}

function hideLoad() {
    document.getElementById('loadingOverlay').classList.remove('active');
}

function formatSize(s) {
    if (s < 1024) return s + 'B';
    if (s < 1048576) return (s / 1024).toFixed(1) + 'KB';
    return (s / 1048576).toFixed(1) + 'MB';
}

function handleFile(file) {
    if (!file) return;
    var ext = file.name.split('.').pop().toLowerCase();
    if (ext !== 'schematic' && ext !== 'litematic') {
        log('不支持: ' + ext);
        return;
    }
    document.getElementById('dropZone').classList.add('has-file');
    document.getElementById('fileInfo').style.display = 'block';
    document.getElementById('fileNameDisplay').textContent = file.name;
    document.getElementById('fileSizeDisplay').textContent = formatSize(file.size);
    document.getElementById('dropText').textContent = '文件已选择，点击更换';
    document.getElementById('previewBtn').disabled = false;
    log('加载: ' + file.name);
}

document.getElementById('fileInput').addEventListener('change', function() {
    if (this.files.length > 0) handleFile(this.files[0]);
});

document.getElementById('dropZone').addEventListener('click', function() {
    document.getElementById('fileInput').click();
});

document.getElementById('dropZone').addEventListener('dragover', function(e) {
    e.preventDefault();
    this.classList.add('drag-over');
});

document.getElementById('dropZone').addEventListener('dragleave', function() {
    this.classList.remove('drag-over');
});

document.getElementById('dropZone').addEventListener('drop', function(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) {
        document.getElementById('fileInput').files = e.dataTransfer.files;
        handleFile(e.dataTransfer.files[0]);
    }
});

function clearAll() {
    document.getElementById('fileInput').value = '';
    document.getElementById('dropZone').classList.remove('has-file');
    document.getElementById('fileInfo').style.display = 'none';
    document.getElementById('dropText').textContent = '点击选择 或 拖拽 .schematic / .litematic';
    document.getElementById('previewBtn').disabled = true;
    document.getElementById('dlArea').style.display = 'none';
    document.getElementById('cmdLog').textContent = '等待转换...';
    document.getElementById('cmdCount').textContent = '0';
    document.getElementById('infoText').textContent = '';
    log('已清空');
}

function copyCommands() {
    var t = document.getElementById('cmdLog').textContent;
    if (!t || t === '等待转换...') return;
    navigator.clipboard.writeText(t).then(function() {
        showToast('已复制', 'success');
    }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = t;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        showToast('已复制', 'success');
    });
}

function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || 'info') + ' show';
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(function() {
        t.classList.remove('show');
    }, 3000);
}

// 模拟转换（实际使用时替换为真实API）
function convert() {
    var f = document.getElementById('fileInput').files[0];
    if (!f) { log('请先选择文件'); return; }
    showLoad();
    setTimeout(function() {
        hideLoad();
        log('转换完成（演示）');
        document.getElementById('cmdLog').textContent = '# 演示指令\n# 文件: ' + f.name + '\nsetblock ~0 ~0 ~0 stone';
        document.getElementById('cmdCount').textContent = '1';
        document.getElementById('dlArea').style.display = 'block';
        switchTab('cmd');
    }, 1000);
}

function preview() {
    var f = document.getElementById('fileInput').files[0];
    if (!f) return;
    showLoad();
    setTimeout(function() {
        hideLoad();
        document.getElementById('previewFrame').src = 'about:blank';
        switchTab('preview');
        log('预览已生成（演示）');
    }, 800);
}

function switchVer(v) {
    log('切换到: ' + v);
