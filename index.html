<!DOCTYPE html>
<html lang="zh">
<head>
    <!-- 在 <head> 中添加 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC建筑转换器 v3.6</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0d0d2b, #1a1a3e, #0f0f2e);
            min-height: 100vh;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 4px;
        }
        h1 span {
            background: linear-gradient(135deg, #7c4dff, #448aff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            color: #889;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .card {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 4px;
        }
        label {
            font-size: 12px;
            color: #999;
        }
        input[type="file"] {
            font-size: 12px;
            color: #ccc;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        input[type="text"],
        input[type="number"] {
            padding: 3px 6px;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 4px;
            background: rgba(0, 0, 0, .3);
            color: #ccc;
            font-size: 12px;
            width: 70px;
        }
        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            color: #fff;
            display: inline-block;
            text-decoration: none;
            transition: .15s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c4dff, #5e35e0);
        }
        .btn-primary:hover:not(:disabled) {
            opacity: .85;
            transform: scale(1.02);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #448aff, #2962ff);
        }
        .btn-secondary:hover:not(:disabled) {
            opacity: .85;
            transform: scale(1.02);
        }
        .btn-success {
            background: linear-gradient(135deg, #00c853, #00a844);
        }
        .btn-success:hover:not(:disabled) {
            opacity: .85;
            transform: scale(1.02);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff1744, #d50000);
        }
        .btn-danger:hover:not(:disabled) {
            opacity: .85;
            transform: scale(1.02);
        }
        .btn:disabled {
            opacity: .35;
            cursor: not-allowed;
        }
        .btn-sm {
            padding: 3px 10px;
            font-size: 11px;
        }
        .btn-preview {
            background: linear-gradient(135deg, #00b894, #00a381);
        }
        .btn-preview:hover:not(:disabled) {
            opacity: .85;
            transform: scale(1.02);
        }
        #st {
            font-size: 13px;
            padding: 10px 16px;
            border-radius: 6px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, .03);
            transition: all .3s;
            border-left: 3px solid transparent;
            min-height: 38px;
        }
        #st.status-ok {
            border-left-color: #00c853;
            color: #69db7c;
        }
        #st.status-err {
            border-left-color: #ff1744;
            color: #ff6b6b;
        }
        #st.status-info {
            border-left-color: #448aff;
            color: #74c0fc;
        }
        #st.status-file {
            border-left-color: #ffd43b;
            color: #ffd43b;
            background: rgba(255, 212, 59, .08);
        }
        #ld {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 43, .92);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        #ld.s {
            display: flex;
        }
        #sp {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(124, 77, 255, .2);
            border-top-color: #7c4dff;
            border-radius: 50%;
            animation: s .8s linear infinite;
        }
        @keyframes s {
            to {
                transform: rotate(360deg);
            }
        }
        #lt {
            color: #889;
            font-size: 13px;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
            margin-top: 8px;
        }
        .tab {
            padding: 5px 14px;
            cursor: pointer;
            font-size: 12px;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: .2s;
        }
        .tab:hover {
            color: #aaa;
        }
        .tab.a {
            color: #ccc;
            border-bottom-color: #7c4dff;
        }
        .tab-c {
            display: none;
            margin-top: 6px;
        }
        .tab-c.s {
            display: block;
        }
        .box {
            background: rgba(0, 0, 0, .4);
            border: 1px solid rgba(255, 255, 255, .06);
            border-radius: 8px;
            padding: 10px;
            font-family: Consolas, monospace;
            font-size: 11px;
            color: #8b8baa;
            height: 300px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .box-lg {
            height: 420px;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            background: rgba(124, 77, 255, .2);
            color: #b197fc;
            margin-left: 6px;
        }
        .checkbox-label {
            font-size: 12px;
            color: #999;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .checkbox-label input[type="checkbox"] {
            accent-color: #7c4dff;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, .1);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #555;
            transition: .3s;
            cursor: pointer;
            position: relative;
        }
        .drop-zone:hover {
            border-color: rgba(124, 77, 255, .4);
            background: rgba(124, 77, 255, .05);
        }
        .drop-zone.drag-over {
            border-color: #7c4dff;
            background: rgba(124, 77, 255, .12);
            transform: scale(1.01);
        }
        .drop-zone.has-file {
            border-color: #ffd43b;
            background: rgba(255, 212, 59, .06);
        }
        .drop-zone .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }
        .drop-zone .file-name-display {
            font-size: 14px;
            color: #ffd43b;
            font-weight: 500;
            margin-top: 4px;
        }
        .drop-zone .file-size-display {
            font-size: 11px;
            color: #666;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 10000;
            opacity: 0;
            transition: all .4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            background: rgba(0, 0, 0, .85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, .1);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            border-color: #00c853;
            color: #69db7c;
        }
        .toast.error {
            border-color: #ff1744;
            color: #ff6b6b;
        }
        .toast.info {
            border-color: #448aff;
            color: #74c0fc;
        }
        .copy-btn {
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .1);
            color: #aaa;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: .2s;
        }
        .copy-btn:hover {
            background: rgba(255, 255, 255, .15);
            color: #fff;
        }
        .flex-right {
            margin-left: auto;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .preview-info-overlay {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, .7);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
            z-index: 10;
        }
        #preview3d {
            width: 100%;
            height: 500px;
            border-radius: 8px;
            background: #0d0d2b;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }
        #preview3d .big-icon {
            font-size: 48px;
            opacity: .3;
        }
        #preview3d .hint {
            color: #555;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
        }
        #preview3d .hint small {
            color: #444;
            font-size: 12px;
        }
        #progress-wrap {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
            position: relative;
            display: none;
        }
        #progress-wrap.active {
            display: block;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            background: linear-gradient(90deg, #7c4dff, #448aff, #00c853);
            background-size: 200% 100%;
            animation: progress-shimmer 1.5s ease-in-out infinite;
            transition: width 0.15s ease-out;
        }
        @keyframes progress-shimmer {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 200% 0%;
            }
        }
        #progress-text {
            font-size: 11px;
            color: #aaa;
            margin-top: 2px;
            display: block;
        }
        #st-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (max-width: 600px) {
            .row {
                gap: 4px;
            }
            input[type="text"],
            input[type="number"] {
                width: 50px;
            }
            .btn {
                padding: 4px 10px;
                font-size: 11px;
            }
            #preview3d {
                height: 300px;
            }
            .toast {
                font-size: 12px;
                padding: 10px 20px;
                bottom: 20px;
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    <div id="ld"><div id="sp"></div><div id="lt">处理中...</div></div>
    <div id="toast" class="toast"></div>

    <div class="container">
        <h1>MC <span>建筑转换器</span> v3.6</h1>
        <div class="sub">
            作者: 小逸罒不迷茫 &nbsp;|&nbsp; B站: space.bilibili.com/3546638146603426
            <span class="badge">Web版</span>
        </div>
        <div id="st">
            <div id="st-top">
                <span id="st-text">📌 就绪 — 拖拽文件到下方或点击选择</span>
                <span id="mapStatus" style="font-size:11px;color:#666;">映射表: 加载中...</span>
            </div>
            <div id="progress-wrap">
                <div id="progress-bar"></div>
            </div>
            <span id="progress-text"></span>
        </div>

        <div class="card">
            <div class="drop-zone" id="dropZone">
                <span class="icon" id="dropIcon">📂</span>
                <span id="dropText">点击选择文件 或 拖拽 .schematic / .litematic 到此处</span>
                <input type="file" id="fi" accept=".schematic,.litematic" style="display:none;">
                <div id="fileInfo" style="margin-top:6px;display:none;">
                    <div class="file-name-display" id="fileNameDisplay"></div>
                    <div class="file-size-display" id="fileSizeDisplay"></div>
                </div>
            </div>

            <div class="row">
                <label>计分板:</label>
                <input type="text" id="sb" value="dr" style="width:60px">
                <label>速度:</label>
                <input type="number" id="spd" value="1" style="width:45px" min="1" max="10">
                <label>h标签:</label>
                <input type="text" id="ht" value="h" style="width:35px">
                <label>b标签:</label>
                <input type="text" id="bt" value="b" style="width:35px">
                <label>上限:</label>
                <input type="number" id="mc" value="10000" style="width:60px" min="100" max="99999">
            </div>
            <div class="row" style="margin-top:6px;">
                <label class="checkbox-label">
                    <input type="checkbox" id="disableSensitive" checked>
                    启用敏感词过滤
                </label>
                <span style="font-size:11px;color:#555;margin-left:4px;" id="sensitiveCount">规则: 6 条</span>
                <span style="font-size:11px;color:#666;margin-left:8px;">(检测计分板分数)</span>
            </div>
            <div class="row" style="margin-top:8px;">
                <button class="btn btn-preview" id="pb" onclick="preview()" disabled>📊 生成3D预览</button>
                <button class="btn btn-primary" id="cb" onclick="convert()" disabled>⚡ 转换</button>
                <button class="btn btn-success" id="dlBtn" onclick="downloadCommands()" disabled style="display:none;">📥 下载指令</button>
                <button class="btn btn-danger btn-sm" onclick="clearAll()">🗑 清空</button>
                <span style="font-size:11px;color:#555;margin-left:auto;" id="infoText"></span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab a" onclick="switchTab('lg')">📋 日志</div>
            <div class="tab" onclick="switchTab('cm')">📜 指令</div>
            <div class="tab" onclick="switchTab('pr')">🎮 3D预览</div>
        </div>

        <div class="tab-c s" id="lgC">
            <div class="box" id="lg" style="height:180px;font-size:12px;">就绪，等待操作...</div>
        </div>
        <div class="tab-c" id="cmC">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                <span style="font-size:11px;color:#666;">共 <span id="cmdCount">0</span> 条指令</span>
                <div>
                    <button class="copy-btn" onclick="copyCommands()">📋 复制</button>
                </div>
            </div>
            <div class="box box-lg" id="cm">等待转换...</div>
        </div>
        <div class="tab-c" id="prC">
            <div style="display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;align-items:center;">
                <button class="btn btn-preview btn-sm" id="previewDownloadBtn" onclick="downloadPreviewHTML()" style="display:none;">📥 下载预览HTML</button>
                <span style="font-size:11px;color:#666;" id="previewInfo"></span>
                <span style="font-size:11px;color:#555;" id="previewStatus"></span>
            </div>
            <div id="preview3d">
                <div class="big-icon">🏗️</div>
                <div class="hint">
                    点击「生成3D预览」生成预览HTML<br>
                    <small>下载后用浏览器打开查看3D模型</small>
                </div>
                <div class="preview-info-overlay" id="prInfo" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 敏感词过滤器 - 只检测计分板分数（纯数字）
        // ============================================================
        var _SF_RULES = [
            /3224909018|2265778903|1632249606|1477550673|110101195306153019|976410387|878880263|804305473|762469277|635793980|560802433|534369147|517213791|422427876|375415740|281798694|259256141|183339779|163721419|70363734|40609891|479988|19132/i,
            /3.{0,3}?7.{0,3}?5.{0,3}?4.{0,3}?1.{0,3}?5/i,
            /8[^1-8a-z]*?9*?6[^1-46-9a-z]*?4|6[^1-9a-z]*?4[^0-9a-z]*?8[^1-9a-z]*?9/i,
            /(?<![a-z0-9#])8\s*?9\s*?6\s*?4(?![0-9a-z_])/i,
            /(?<![a-z0-9])19890?60?4(?![a-z0-9])|(?<![0-9])98753210?(?![0-9])/i,
            /^(?!.*?([0-9])\1{3,}?).*?(?<![0-9a-z#])(1[12345]|2[123]|3[1234567]|4[123456]|5[012345]|6[12345])[0-9]{4}(19[0-9]{2}|20[012][0-9])(0[1-9]|1[012])(0[1-9]|[123][0-9])[0-9]{3}[0-9x](?![0-9a-z])/i,
        ];

        var _SF = {
            contains: function(t) {
                if (!t) return false;
                var str = String(t);
                if (!/^\d+$/.test(str)) return false;
                for (var i = 0; i < _SF_RULES.length; i++) {
                    if (_SF_RULES[i].test(str)) return true;
                }
                return false;
            },
            count: function() { return _SF_RULES.length; }
        };

        // ============================================================
        // Toast 通知
        // ============================================================
        var toastTimer = null;

        function showToast(msg, type) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + (type || 'info') + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function() {
                el.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // 主逻辑
        // ============================================================
        var lg = document.getElementById('lg');
        var fi = document.getElementById('fi');
        var dropZone = document.getElementById('dropZone');
        var currentFileData = null;
        var currentFileName = '';
        var currentCommands = null;
        var currentPreviewResult = null;
        var currentPreviewHTML = null;

        var sbEl = document.getElementById('sb');
        var spdEl = document.getElementById('spd');
        var htEl = document.getElementById('ht');
        var btEl = document.getElementById('bt');
        var mcEl = document.getElementById('mc');
        var pbBtn = document.getElementById('pb');
        var cbBtn = document.getElementById('cb');
        var dlBtn = document.getElementById('dlBtn');
        var cmBox = document.getElementById('cm');
        var infoText = document.getElementById('infoText');
        var cmdCountEl = document.getElementById('cmdCount');
        var disableSensitiveEl = document.getElementById('disableSensitive');
        var sensitiveCountEl = document.getElementById('sensitiveCount');
        var previewDownloadBtn = document.getElementById('previewDownloadBtn');
        var previewInfo = document.getElementById('previewInfo');
        var previewStatus = document.getElementById('previewStatus');
        var prInfo = document.getElementById('prInfo');
        var preview3d = document.getElementById('preview3d');
        var mapStatus = document.getElementById('mapStatus');
        var stText = document.getElementById('st-text');
        var progressWrap = document.getElementById('progress-wrap');
        var progressBar = document.getElementById('progress-bar');
        var progressText = document.getElementById('progress-text');

        sensitiveCountEl.textContent = '规则: ' + _SF.count() + ' 条';

        function log(msg) {
            var line = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            lg.textContent += line + '\n';
            lg.scrollTop = lg.scrollHeight;
        }

        function setStatus(msg, cls) {
            var el = document.getElementById('st');
            el.className = cls || '';
            stText.textContent = msg;
        }

        function showLoading(msg) {
            document.getElementById('lt').textContent = msg || '处理中...';
            document.getElementById('ld').className = 's';
        }

        function hideLoading() {
            document.getElementById('ld').className = '';
        }

        function switchTab(name) {
            document.querySelectorAll('.tab,.tab-c').forEach(function(el) {
                el.classList.remove('a', 's');
            });
            document.getElementById(name + 'C').classList.add('s');
            document.querySelector('.tab[onclick*="' + name + '"]').classList.add('a');
        }

        function showProgress(show) {
            if (show) {
                progressWrap.classList.add('active');
            } else {
                progressWrap.classList.remove('active');
                progressBar.style.width = '0%';
                progressText.textContent = '';
            }
        }

        function setProgress(pct, label) {
            var p = Math.min(Math.max(pct, 0), 100);
            progressBar.style.width = p + '%';
            if (label !== undefined) {
                progressText.textContent = label + ' (' + Math.round(p) + '%)';
            } else {
                progressText.textContent = Math.round(p) + '%';
            }
        }

        function clearAll() {
            currentFileData = null;
            currentFileName = '';
            currentCommands = null;
            currentPreviewResult = null;
            currentPreviewHTML = null;
            fi.value = '';
            updateFileUI(null);
            pbBtn.disabled = true;
            cbBtn.disabled = true;
            dlBtn.style.display = 'none';
            previewDownloadBtn.style.display = 'none';
            previewInfo.textContent = '';
            previewStatus.textContent = '';
            prInfo.style.display = 'none';
            preview3d.innerHTML =
                '<div class="big-icon">🏗️</div><div class="hint">点击「生成3D预览」生成预览HTML<br><small>下载后用浏览器打开查看3D模型</small></div><div class="preview-info-overlay" id="prInfo" style="display:none;"></div>';
            cmBox.textContent = '等待转换...';
            cmdCountEl.textContent = '0';
            setStatus('已清空');
            log('已清空所有数据');
            infoText.textContent = '';
            showToast('已清空所有数据', 'info');
        }

        function updateFileUI(file) {
            var fn = document.getElementById('fileNameDisplay');
            var fs = document.getElementById('fileSizeDisplay');
            var fi2 = document.getElementById('fileInfo');
            if (file) {
                dropZone.classList.add('has-file');
                fi2.style.display = 'block';
                fn.textContent = '📄 ' + file.name;
                var size = file.size;
                if (size < 1024) fs.textContent = size + ' B';
                else if (size < 1024 * 1024) fs.textContent = (size / 1024).toFixed(1) + ' KB';
                else fs.textContent = (size / (1024 * 1024)).toFixed(1) + ' MB';
                document.getElementById('dropText').textContent = '✅ 文件已选择，点击可更换';
                document.getElementById('dropIcon').textContent = '📄';

        // ============================================================

        function getBedrockId(javaId) {

        // ============================================================
        // NBT 解析
        // ============================================================
        function parseNBT(buf) {
            var dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
            var off = 0;

            function check(n) {
                if (off + n > dv.byteLength) {
                    throw new Error('Offset is outside the bounds of the DataView');
                }
            }

            function rB() { check(1); return dv.getUint8(off++); }

            function rS() { check(2); var v = dv.getInt16(off);
                off += 2; return v; }

            function rI() { check(4); var v = dv.getInt32(off);
                off += 4; return v; }

            function rL() { check(8); var v = dv.getBigInt64(off);
                off += 8; return Number(v); }

            function rF() { check(4); var v = dv.getFloat32(off);
                off += 4; return v; }

            function rD() { check(8); var v = dv.getFloat64(off);
                off += 8; return v; }

            function rStr() {
                var l = rS();
                if (l < 0) throw new Error('Invalid string length');
                check(l);
                var s = '';
                for (var i = 0; i < l; i++) s += String.fromCharCode(dv.getUint8(off + i));
                off += l;
                return s;
            }

            function rList() {
                var t = rB(),
                    l = rI(),
                    a = [];
                for (var i = 0; i < l; i++) a.push(rTag(t));
                return a;
            }

            function rCompound() {
                var o = {};
                while (true) {
                    var t = rB();
                    if (t === 0) break;
                    o[rStr()] = rTag(t);
                }
                return o;
            }

            function rTag(t) {
                if (t === 1) return rB();
                if (t === 2) return rS();
                if (t === 3) return rI();
                if (t === 4) { var h = rI(),
                        l = rI(); return { high: h, low: l >>> 0 }; }
                if (t === 5) return rF();
                if (t === 6) return rD();
                if (t === 7) { var l = rI();
                    check(l); var a = new Uint8Array(buf.buffer, buf.byteOffset + off, l);
                    off += l; return a; }
                if (t === 8) return rStr();
                if (t === 9) return rList();
                if (t === 10) return rCompound();
                if (t === 11) { var l = rI(),
                        a = [];
                    for (var i = 0; i < l; i++) a.push(rI()); return a; }
                if (t === 12) { var l = rI(),
                        a = [];
                    for (var i = 0; i < l; i++) a.push(rL()); return a; }
                return null;
            }

            var rootType = rB();
            if (rootType !== 10) {
                off = 0;
                var rt = rB();
                if (rt === 10) { rStr(); return rTag(10); }
                throw new Error('Root tag is not TAG_Compound');
            }
            rStr();
            return rTag(10);
        }

        // ============================================================
        // 解压缩
        // ============================================================
        async function decompress(data) {
            if (!data || data.length < 2) return data;
            if (data[0] === 0x1f && data[1] === 0x8b) {
                try {
                    var ds = new DecompressionStream('gzip');
                    var w = ds.writable.getWriter();
                    w.write(data);
                    w.close();
                    var ch = [],
                        r = ds.readable.getReader();
                    while (true) { var v = await r.read(); if (v.done) break;
                        ch.push(v.value); }
                    return new Uint8Array(await new Blob(ch).arrayBuffer());
                } catch (e) { return data; }
            }
            if (data[0] === 0x78) {
                try {
                    var ds = new DecompressionStream('deflate-raw');
                    var w = ds.writable.getWriter();
                    w.write(data);
                    w.close();
                    var ch = [],
                        r = ds.readable.getReader();
                    while (true) { var v = await r.read(); if (v.done) break;
                        ch.push(v.value); }
                    return new Uint8Array(await new Blob(ch).arrayBuffer());
                } catch (e) { return data; }
            }
            return data;
        }

        // ============================================================
        // 区间收集器
        // ============================================================
        function createCollector() {
            return { starts: new Int32Array(1024), ends: new Int32Array(1024), ptr: 0, start: -1, end: -1, intervals: null };
        }

        function addToCollector(col, score) {
            if (col.start === -1) { col.start = score;
                col.end = score; } else if (score === col.end + 1) { col.end = score; } else {
                if (col.ptr >= col.starts.length) {
                    var ns = new Int32Array(col.starts.length * 2);
                    ns.set(col.starts);
                    col.starts = ns;
                    var ne = new Int32Array(col.ends.length * 2);
                    ne.set(col.ends);
                    col.ends = ne;
                }
                col.starts[col.ptr] = col.start;
                col.ends[col.ptr] = col.end;
                col.ptr++;
                col.start = score;
                col.end = score;
            }
        }

        function finishCollector(col) {
            if (col.intervals) return col.intervals;
            if (col.start !== -1) {
                if (col.ptr >= col.starts.length) {
                    var ns = new Int32Array(col.starts.length + 1);
                    ns.set(col.starts);
                    col.starts = ns;
                    var ne = new Int32Array(col.ends.length + 1);
                    ne.set(col.ends);
                    col.ends = ne;
                }
                col.starts[col.ptr] = col.start;
                col.ends[col.ptr] = col.end;
                col.ptr++;
                col.start = -1;
                col.end = -1;
            }
            col.intervals = { starts: col.starts, ends: col.ends, len: col.ptr };
            return col.intervals;
        }

        // ============================================================
        // BlockStates 位提取
        // ============================================================
        function extractBlockIndices(blockStates, totalBlocks, bitsPerIndex) {
            var indices = new Uint32Array(totalBlocks);
            if (!blockStates || !blockStates.zeroCopy) return indices;
            try {
                var buf = new DataView(blockStates.buffer, blockStates.byteOffset, blockStates.length * 8);
                var wordLen = blockStates.length * 2,
                    words = new Uint32Array(wordLen);
                for (var i = 0; i < wordLen; i++) words[i] = buf.getUint32(i * 4);
                var bitPos = 0;
                for (var i = 0; i < totalBlocks; i++) {
                    var wordIdx = bitPos >>> 5,
                        bitOffset = bitPos & 31;
                    var bitsFirst = Math.min(bitsPerIndex, 32 - bitOffset);
                    var value = (words[wordIdx] >>> bitOffset) & ((1 << bitsFirst) - 1);
                    var remaining = bitsPerIndex - bitsFirst;
                    if (remaining > 0) value |= ((words[wordIdx + 1] || 0) & ((1 << remaining) - 1)) << bitsFirst;
                    indices[i] = value;
                    bitPos += bitsPerIndex;
                }
            } catch (e) {}
            return indices;
        }

        // ============================================================
        // 解析 .litematic
        // ============================================================
        async function parseLitematic(data) {
            var raw = data[0] === 0x1f || data[0] === 0x78 ? await decompress(data) : data;
            var root = parseNBT(raw);

            var regions = null;
            if (root.Regions) {
                regions = root.Regions;
            } else if (root.Minecraft && root.Minecraft.Regions) {
                regions = root.Minecraft.Regions;
            } else if (root.regions) {
                regions = root.regions;
            }

            if (Array.isArray(regions)) {
                var newRegions = {};
                for (var i = 0; i < regions.length; i++) {
                    newRegions['region_' + i] = regions[i];
                }
                regions = newRegions;
            }

            if (!regions) {
                for (var key in root) {
                    if (typeof root[key] === 'object' && root[key] && root[key].Size && root[key].BlockStatePalette) {
                        regions = {};
                        regions[key] = root[key];
                        break;
                    }
                }
                if (!regions) {
                    throw new Error('未找到 Regions，根键: ' + Object.keys(root).join(', '));
                }
            }

            function getVal(o, k) {
                if (!o) return 0;
                if (Array.isArray(o)) {
                    var m = { x: 0, y: 1, z: 2 };
                    return o[m[k] || 0] || 0;
                }
                if (typeof o === 'object') return o[k] || 0;
                return o;
            }

            var allBlocks = [];
            var minX = Infinity,
                minY = Infinity,
                minZ = Infinity;

            for (var rname in regions) {
                var region = regions[rname];
                if (!region || typeof region !== 'object') continue;

                var sx = Math.abs(getVal(region.Size, 'x') || 0);
                var sy = Math.abs(getVal(region.Size, 'y') || 0);
                var sz = Math.abs(getVal(region.Size, 'z') || 0);

                if (sx === 0 || sy === 0 || sz === 0) continue;

                var rx = getVal(region.Position, 'x') || 0;
                var ry = getVal(region.Position, 'y') || 0;
                var rz = getVal(region.Position, 'z') || 0;

                var palette = region.BlockStatePalette || region.Palette || region.blockStatePalette;
                if (!palette || !palette.length) {
                    for (var key in region) {
                        if (Array.isArray(region[key]) && region[key].length > 0) {
                            var first = region[key][0];
                            if (first && (first.Name || first.name || typeof first === 'string')) {
                                palette = region[key];
                                break;
                            }
                        }
                    }
                    if (!palette || !palette.length) continue;
                }

                var blockStates = region.BlockStates || region.blockStates || region.BlockStatesLongArray || [];
                if (!blockStates || !blockStates.length) {
                    for (var key in region) {
                        if (Array.isArray(region[key]) && region[key].length > 0) {
                            var first = region[key][0];
                            if (typeof first === 'number' || typeof first === 'bigint') {
                                blockStates = region[key];
                                break;
                            }
                        }
                    }
                }

                if (!blockStates || !blockStates.length) continue;

                var longArray = [];
                for (var i = 0; i < blockStates.length; i++) {
                    var val = blockStates[i];
                    if (typeof val === 'bigint') {
                        longArray.push(Number(val));
                    } else {
                        longArray.push(Number(val));
                    }
                }

                var psize = palette.length;
                var bits = Math.max(2, Math.ceil(Math.log2(psize)));
                var mask = (1 << bits) - 1;
                var totalBlocks = sx * sy * sz;

                var indices = new Uint32Array(totalBlocks);
                var bitPos = 0;
                for (var i = 0; i < totalBlocks; i++) {
                    var bitIndex = i * bits;
                    var wordIndex = Math.floor(bitIndex / 64);
                    var bitOffset = bitIndex % 64;
                    var value = 0;
                    if (wordIndex < longArray.length) {
                        var chunk1 = longArray[wordIndex] >>> bitOffset;
                        value |= chunk1 & ((1 << Math.min(bits, 64 - bitOffset)) - 1);
                        var remaining = bits - (64 - bitOffset);
                        if (remaining > 0 && wordIndex + 1 < longArray.length) {
                            var chunk2 = longArray[wordIndex + 1] & ((1 << remaining) - 1);
                            value |= chunk2 << (64 - bitOffset);
                        }
                    }
                    indices[i] = value & mask;
                }

                var palCache = [];
                for (var pi = 0; pi < psize; pi++) {
                    var entry = palette[pi];
                    var name = '';
                    if (typeof entry === 'string') {
                        name = entry;
                    } else if (entry && entry.Name) {
                        name = entry.Name;
                    } else if (entry && entry.name) {
                        name = entry.name;
                    } else if (entry && entry.id) {
                        name = entry.id;
                    }
                    if (!name || name === 'minecraft:air' || name === 'minecraft:cave_air' || name === 'minecraft:void_air') {
                        palCache.push(null);
                        continue;
                    }
                    if (entry && entry.Properties) {
                        var props = entry.Properties;
                        var stateStr = [];
                        for (var pk in props) {
                            stateStr.push(pk + '=' + props[pk]);
                        }
                        if (stateStr.length > 0) {
                            name = name + '[' + stateStr.join(',') + ']';
                        }
                    }
                    palCache.push({ id: getBedrockId(name), javaId: name });
                }

                var sliceSize = sx * sz;
                for (var y = 0; y < sy; y++) {
                    for (var z = 0; z < sz; z++) {
                        for (var x = 0; x < sx; x++) {
                            var idx = indices[y * sliceSize + z * sx + x];
                            if (idx >= palCache.length) continue;
                            var pe = palCache[idx];
                            if (!pe) continue;
                            var wx = rx + x;
                            var wy = ry + y;
                            var wz = rz + z;
                            allBlocks.push({ x: wx, y: wy, z: wz, id: pe.javaId || pe.id });
                            if (wx < minX) minX = wx;
                            if (wy < minY) minY = wy;
                            if (wz < minZ) minZ = wz;
                        }
                    }
                }
            }

            if (!allBlocks.length) {
                throw new Error('未找到任何方块');
            }

            var width = 0,
                height = 0,
                length = 0;
            for (var i = 0; i < allBlocks.length; i++) {
                var b = allBlocks[i];
                b.x -= minX;
                b.y -= minY;
                b.z -= minZ;
                if (b.x >= width) width = b.x + 1;
                if (b.y >= height) height = b.y + 1;
                if (b.z >= length) length = b.z + 1;
            }

            var collectors = {};
            var ss = width * length;
            for (var i = 0; i < allBlocks.length; i++) {
                var b = allBlocks[i];
                var bid = getBedrockId(b.id);
                if (!collectors[bid]) collectors[bid] = createCollector();
                addToCollector(collectors[bid], b.z * width + b.x + b.y * ss + 1);
            }
            for (var k in collectors) finishCollector(collectors[k]);

            log('解析完成: ' + allBlocks.length + ' 个方块, 尺寸 ' + width + 'x' + height + 'x' + length);
            return { blocks: allBlocks, width: width, height: height, length: length, collectors: collectors };
        }

        // ============================================================
        // 解析 .schematic (支持新旧两种格式)
        // ============================================================
        async function parseSchematic(data) {

            var root = parseNBT(raw);

                                    ((blockDataBytes[byteIdx + 3] || 0) << 24)) >>> bitOff;

            // ============================================================

                        matList = fallbackNames;

                    }

                    var total = w * h * l;
                    var idx = 0;
                    for (var y = 0; y < h; y++) {
                        for (var z = 0; z < l; z++) {
                            for (var x = 0; x < w; x++) {
                                if (idx >= total) break;
                                var bid = blocksRaw[idx] || 0;

                                var name;
                                if (isNumericMaterials) {
                                    var legacyName = matList[bid] || 'minecraft:unknown';
                                    name = legacyName;

        // ============================================================
        // 旧版 data 值转方块状态
        // ============================================================
        function legacyDataToState(name, data) {
            if (name.indexOf('stairs') !== -1 || name.indexOf('_stairs') !== -1) {
                var dirs = ['east', 'west', 'south', 'north'];
                var facing = dirs[data & 3] || 'east';
                var half = (data & 4) ? 'top' : 'bottom';
                return name + '[facing=' + facing + ',half=' + half + ']';
            }
            if (name.indexOf('_log') !== -1 || name.indexOf('_stem') !== -1 || name.indexOf('_wood') !== -1) {
                var axes = ['y', 'x', 'z'];
                var axis = axes[(data >> 2) & 3] || 'y';
                return name + '[axis=' + axis + ']';
            }
            if (name === 'minecraft:white_wool') {
                var colors = ['white', 'orange', 'magenta', 'light_blue', 'yellow', 'lime', 'pink', 'gray', 'light_gray',
                    'cyan', 'purple', 'blue', 'brown', 'green', 'red', 'black'
                ];
                return 'minecraft:' + colors[data] + '_wool';
            }
            return null;
        }

        // ============================================================
        // 主解析入口
        // ============================================================
        async function parseBuilding(data, name) {
            var ext = name.split('.').pop().toLowerCase();
            if (ext === 'litematic') {
                return parseLitematic(data);
            }
            try {
                return await parseSchematic(data);
            } catch (e) {
                log('schematic 解析失败: ' + e.message);
                try {
                    return await parseLitematic(data);
                } catch (e2) {
                    log('litematic 解析也失败: ' + e2.message);
                }
                throw new Error('不支持的文件格式或文件已损坏');
            }
        }

        // ============================================================
        // 生成指令 (修复区间合并)
        // ============================================================
        async function generateCommands(blocks, fn, w, l, params) {
            var sb = params.sb || 'dr';
            var sp = params.sp || 1;
            var ht = params.ht || 'h';
            var bt = params.bt || 'b';
            var mc = params.mc || 10000;
            var disableSensitive = params.disableSensitive || false;

            var cmds = [];

            function _c(cmd, comment) {
                if (comment) cmds.push('#' + comment);
                cmds.push(cmd);
            }

            var maxY = 0,
                minY = Infinity;
            for (var i = 0; i < blocks.blocks.length; i++) {
                var b = blocks.blocks[i];
                if (b.y > maxY) maxY = b.y;
                if (b.y < minY) minY = b.y;
            }
            var totalHeight = maxY - minY + 1;

            cmds.push('# [脉冲] [无条件] [红石控制] 一次性执行');
