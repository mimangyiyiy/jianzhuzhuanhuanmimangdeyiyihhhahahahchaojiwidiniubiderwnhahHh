<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>MC 建筑转换器 v3.6 — 纯前端 / 零依赖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background: linear-gradient(135deg, #0d0d2b 0%, #1a1a3e 50%, #0f0f2e 100%);
  min-height:100vh;font-family:"Segoe UI","Microsoft YaHei",sans-serif;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.container{max-width:780px;width:100%}

/* 头部 */
.header{text-align:center;margin-bottom:28px}
.header h1{font-size:36px;color:#fff;letter-spacing:1px}
.header h1 span{background:linear-gradient(135deg,#7c4dff,#448aff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:#889;font-size:14px;margin-top:6px}
.header .badge{display:inline-flex;gap:8px;margin-top:8px}
.header .badge span{
  background:rgba(124,77,255,.15);color:#7c4dff;padding:3px 12px;
  border-radius:20px;font-size:12px;border:1px solid rgba(124,77,255,.25)
}

/* 状态条 */
#statusBar{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:14px 20px;margin-bottom:12px;
  color:#889;font-size:13px;display:flex;align-items:center;gap:10px;
  transition:.3s
}
#statusBar.ready{color:#7c4dff;border-color:rgba(124,77,255,.3);background:rgba(124,77,255,.08)}
#statusBar.error{color:#e44;border-color:rgba(255,50,50,.3)}
#statusDot{
  width:8px;height:8px;border-radius:50%;background:#666;
  display:inline-block;flex-shrink:0;transition:.3s
}
#statusBar.ready #statusDot{background:#7c4dff;box-shadow:0 0 8px rgba(124,77,255,.6)}
#statusBar.error #statusDot{background:#e44}

/* 上传区 */
#dropZone{
  background:rgba(255,255,255,.03);border:2px dashed rgba(255,255,255,.1);
  border-radius:16px;padding:48px 20px;text-align:center;cursor:pointer;
  transition:.25s;position:relative;overflow:hidden;margin-bottom:12px;
}
#dropZone:hover,#dropZone.drag{
  border-color:#7c4dff;background:rgba(124,77,255,.06);
  box-shadow:0 0 40px rgba(124,77,255,.1)
}
#dropZone .icon{font-size:48px;line-height:1;margin-bottom:14px;opacity:.8}
#dropZone .title{color:#ccc;font-size:16px;margin-bottom:4px}
#dropZone .sub{color:#666;font-size:12px}
#dropZone input[type=file]{display:none}

/* 进度 */
#progress{
  height:3px;background:rgba(255,255,255,.05);border-radius:2px;
  margin-bottom:12px;overflow:hidden;display:none
}
#progress div{
  height:100%;background:linear-gradient(90deg,#7c4dff,#448aff);
  width:0;transition:width .3s;border-radius:2px
}

/* 结果 */
#result{
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);
  border-radius:12px;padding:16px;display:none
}
#result .statRow{display:flex;gap:20px;margin-bottom:10px}
#result .stat{color:#ccc;font-size:12px}
#result .stat b{color:#fff;font-size:16px}
#result .btns{display:flex;gap:8px}
.btn{
  padding:10px 24px;border:none;border-radius:8px;font-size:14px;
  cursor:pointer;color:#fff;transition:.2s;text-decoration:none;display:inline-block
}
.btn-primary{background:linear-gradient(135deg,#7c4dff,#5e35e0)}
.btn-primary:hover{box-shadow:0 4px 20px rgba(124,77,255,.4);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.15)}
.btn-outline:hover{border-color:#fff;background:rgba(255,255,255,.05)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* 日志 */
#log{
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:12px;margin-top:12px;
  font-family:Consolas,monospace;font-size:11px;color:#8b8baa;
  max-height:200px;overflow-y:auto;white-space:pre-wrap;display:none
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>MC <span>建筑转换器</span> v3.6</h1>
    <p>纯前端运行 / 无需安装 / 隐私安全 / 离线可用</p>
    <div class="badge">
      <span>Pyodide WebAssembly</span>
      <span>schematic &amp; litematic</span>
      <span>24 敏感词规则</span>
    </div>
  </div>

  <!-- 加载进度遮罩 -->
  <div id="loadOverlay" style="display:flex;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(13,13,43,.95);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:20px">
    <div id="loadPct" style="color:#7c4dff;font-size:48px;font-weight:bold;font-family:monospace">0%</div>
    <div style="width:300px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden">
      <div id="loadBar" style="height:100%;background:linear-gradient(90deg,#7c4dff,#448aff);width:0;transition:width .3s;border-radius:2px"></div>
    </div>
    <div id="loadText" style="color:#889;font-size:13px">正在连接...</div>
  </div>

  <div id="statusBar">
    <span id="statusDot"></span>
    <span id="statusText">正在加载 Pyodide Python 引擎...</span>
  </div>

  <div id="dropZone">
    <div class="icon">&#9729;</div>
    <div class="title">拖放文件到此处开始转换</div>
    <div class="sub">支持 .schematic &nbsp;|&nbsp; .litematic &nbsp;|&nbsp; 最大 100MB</div>
    <input type="file" id="fileInput" accept=".schematic,.litematic">
  </div>

  <div id="progress"><div></div></div>

  <div id="result">
    <div class="statRow">
      <div class="stat">方块数 <b id="statBlocks">-</b></div>
      <div class="stat">压缩条目 <b id="statComp">-</b></div>
      <div class="stat">总指令 <b id="statCmds">-</b></div>
      <div class="stat">压缩率 <b id="statRatio">-</b></div>
      <div class="stat">手动指令 <b id="statManual">-</b></div>
    </div>
    <div class="btns">
      <a class="btn btn-primary" id="dlLink" download>下载指令文件</a>
      <button class="btn btn-outline" onclick="resetUI()">转换新文件</button>
    </div>
  </div>

  <div id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script>
var pyodide=null,ready=false;
var logEl=document.getElementById('log');

function log(m){logEl.textContent+=m+'\n';logEl.scrollTop=logEl.scrollHeight;logEl.style.display='block'}
function setStatus(t,cls){
  var s=document.getElementById('statusBar');
  document.getElementById('statusText').textContent=t;
  s.className=cls||'';
}

function loadProgress(pct,msg){
  document.getElementById('loadPct').textContent=pct+'%';
  document.getElementById('loadBar').style.width=pct+'%';
  document.getElementById('loadText').textContent=msg;
}

async function init(){
  try{
    loadProgress(0,'正在连接 CDN...');
    // Pyodide 从 jsdelivr CDN 加载，用多个阶段模拟进度
    var stages=[10,'下载 Python 核心',30,'编译 WebAssembly',55,'初始化标准库',80,'加载转换引擎',95,'完成'];
    
    pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/'});
    loadProgress(70,'Python 引擎就绪，加载模块...');

    var sfCode=await(await fetch('py/sensitive_filter.py')).text();
    pyodide.runPython(sfCode);
    loadProgress(80,'敏感词规则已加载');

    var convCode=await(await fetch('py/converter.py')).text();
    pyodide.runPython(convCode);
    loadProgress(95,'转换引擎已加载');

    loadProgress(100,'就绪');
    setTimeout(function(){
      var o=document.getElementById('loadOverlay');
      o.style.transition='opacity .4s';
      o.style.opacity='0';
      setTimeout(function(){o.style.display='none'},400);
    },400);

    setStatus('已就绪，上传文件开始转换','ready');
    ready=true;
  }catch(e){
    loadProgress(100,'失败');
    document.getElementById('loadText').textContent='加载失败: '+e.message;
    document.getElementById('loadText').style.color='#e44';
    setStatus('加载失败: '+e.message,'error');
  }
}
init();

// Drag & Drop
var dz=document.getElementById('dropZone'),fi=document.getElementById('fileInput');
dz.onclick=function(){if(ready)fi.click()};
fi.onchange=function(){if(fi.files[0])convert(fi.files[0])};
dz.ondragover=function(e){e.preventDefault();dz.classList.add('drag')};
dz.ondragleave=function(){dz.classList.remove('drag')};
dz.ondrop=function(e){
  e.preventDefault();dz.classList.remove('drag');
  if(e.dataTransfer.files[0])convert(e.dataTransfer.files[0]);
};

function resetUI(){
  document.getElementById('result').style.display='none';
  logEl.style.display='none';logEl.textContent='';
}

async function convert(file){
  if(!ready){log('引擎还未就绪，请稍候...');return}
  var ext=file.name.split('.').pop().toLowerCase();
  if(!['schematic','litematic'].includes(ext)){log('仅支持 .schematic / .litematic');return}

  resetUI();
  log('文件: '+file.name+' ('+(file.size/1024).toFixed(1)+' KB)');
  setStatus('正在转换 '+file.name+'...');
  dz.style.display='none';
  var pr=document.getElementById('progress');pr.style.display='block';pr.firstChild.style.width='30%';

  var buf=await file.arrayBuffer();
  pyodide.FS.writeFile('/input.'+ext,new Uint8Array(buf));
  pr.firstChild.style.width='60%';

  try{
    var r=pyodide.runPython(`
import json
try:
    r = convert_schematic(None, '/input.${ext}')
    json.dumps(r, ensure_ascii=False)
except Exception as e:
    import traceback
    json.dumps({'error': str(e), 'trace': traceback.format_exc()}, ensure_ascii=False)
`);
    pr.firstChild.style.width='100%';
    var d=JSON.parse(r);
    if(d.error){log('Error: '+d.error);if(d.trace)log(d.trace);setStatus('转换失败','error');return}

    log(d.log||'');
    // 统计手动指令
    var manual=0;
    if(d.commands){var lines=d.commands.split('\n');for(var l of lines){if(l.startsWith('setblock')||l.startsWith('fill'))manual++}}

    document.getElementById('statBlocks').textContent=d.blocks;
    document.getElementById('statComp').textContent=d.compressed;
    document.getElementById('statCmds').textContent=d.total_cmds;
    document.getElementById('statRatio').textContent=((1-d.compressed/d.blocks)*100).toFixed(1)+'%';
    document.getElementById('statManual').textContent=manual;

    var blob=new Blob([d.commands],{type:'text/plain;charset=utf-8'});
    var a=document.getElementById('dlLink');
    a.href=URL.createObjectURL(blob);
    a.download=file.name.replace(/\.[^.]+$/,'')+'_commands.txt';
    document.getElementById('result').style.display='block';
    pr.style.display='none';
    setStatus('转换完成! '+d.total_cmds+' 条指令 (手动setblock: '+manual+')');
  }catch(e){log('Error: '+e.message);setStatus('转换出错','error')}
  finally{pr.style.display='none';dz.style.display='block'}
}
</script>
</body>
</html>
